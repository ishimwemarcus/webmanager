  <div id="debug-error" style="position:fixed; z-index:999999; background:black; color:red; padding:20px; display:none; font-family:monospace; top:0; left:0; width:100%; height:100vh; overflow:auto;"></div>
  <script>
    window.addEventListener('error', function(e) {
      document.getElementById('debug-error').style.display = 'block';
      document.getElementById('debug-error').innerHTML += '<b>Error:</b> ' + e.message + '<br>' + e.filename + ':' + e.lineno + '<br><br>';
    });
    window.addEventListener('unhandledrejection', function(e) {
      document.getElementById('debug-error').style.display = 'block';
      document.getElementById('debug-error').innerHTML += '<b>Unhandled Promise:</b> ' + e.reason + '<br><br>';
    });
  </script>
